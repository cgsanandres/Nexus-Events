<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Events | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

* {box-sizing:border-box; font-family:'Poppins',sans-serif;}
body {margin:0; display:flex; background:#0a0a0f; color:#fff; min-height:100vh;}
.sidebar {width:250px; background:#010114; height:100vh; padding:20px; position:fixed;}
.sidebar h2 {color:#0ff; text-align:center; margin-bottom:30px;}
.sidebar a {display:block; color:#aaa; text-decoration:none; margin:12px 0; padding:10px; border-radius:8px; transition:0.3s;}
.sidebar a:hover {background:#1e1e3b; color:#0ff;}
.main {margin-left:250px; padding:25px; width:100%;}
.card {background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding:20px; border-radius:12px; box-shadow:0 0 15px rgba(0,255,255,0.2); margin-bottom:20px;}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;}
table {width:100%; border-collapse:collapse; margin-top:10px;}
th,td {padding:12px; border-bottom:1px solid #1e293b; text-align:left;}
th {color:#0ff;}
.btn {background:#0ff; color:#010114; padding:10px 15px; border:none; border-radius:6px; cursor:pointer; transition:0.3s;}
.btn:hover {background:#08c; color:#fff;}
input, select, textarea {width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none; outline:none; background:rgba(255,255,255,0.1); color:#fff;}

body {display:flex; justify-content:center; align-items:center; height:100vh; background:#0a0a0f;}
.register-box {background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); padding:40px; border-radius:12px; width:350px; text-align:center;}
.register-box h2 {color:#0ff;}
button {width:100%; margin-top:20px;}
a {color:#0ff;}
</style>
</head>
<body>
<div class="register-box">
<h2>Create Account</h2>
<form onsubmit="return createAccount()">
<input type="text" id="eventID" placeholder="Event ID" required>
<input type="text" id="name" placeholder="Full Name" required>
<input type="password" id="password" placeholder="Password" required>
<button class="btn" type="submit">Register</button>
</form>
<p>Already have an account? <a href="nexuslogin.html">Login</a></p>
</div>
<script>
function createAccount() {
    const studentID = document.getElementById("eventID").value;
    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    localStorage.setItem("eventID", eventID);
    localStorage.setItem("name", name);
    localStorage.setItem("password", password);
    alert("Account created! Login now.");
    window.location.href="nexuslogin.html";
    return false;
}
</script>
</body>
</html>
